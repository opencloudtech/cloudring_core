name: supply-chain

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  supply-chain-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.25.x
          check-latest: true
          cache: true
      - name: Validate workflow syntax
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
      - name: Verify CycloneDX SBOM generation
        shell: bash
        run: |
          set -euo pipefail
          sbom="${RUNNER_TEMP}/cloudring-sbom.cdx.json"
          go run github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@v1.10.0 \
            mod -json -test -licenses -output "${sbom}" .
          jq -e '.bomFormat == "CycloneDX" and .specVersion == "1.6" and (.components | length) >= 1' "${sbom}"
          rm -f "${sbom}"
      - name: Enforce pull request workflow policy
        shell: bash
        run: |
          set -euo pipefail

          if grep -RniE '^[[:space:]]*pull_request_target:' .github/workflows; then
            echo "pull_request_target is forbidden in required workflows" >&2
            exit 1
          fi
          if grep -RniE 'permissions:[[:space:]]*write-all|^[[:space:]]+(actions|checks|contents|deployments|id-token|issues|packages|pages|pull-requests|repository-projects|statuses):[[:space:]]+write' .github/workflows; then
            echo "unexpected write permission in required workflows" >&2
            exit 1
          fi
          if grep -RniE '@(latest|main|master)([[:space:]#]|$)' .github/workflows; then
            echo "mutable tool or action reference is forbidden" >&2
            exit 1
          fi
          if grep -RniE '\$\{\{[[:space:]]*secrets\.' .github/workflows; then
            echo "required pull request workflows must not depend on repository secrets" >&2
            exit 1
          fi

          shopt -s nullglob
          workflow_files=(.github/workflows/*.yml .github/workflows/*.yaml)
          shopt -u nullglob
          if (( ${#workflow_files[@]} == 0 )); then
            echo "no workflows found for immutable-reference validation" >&2
            exit 1
          fi

          uses_query='[.jobs[]? | (.uses?, .steps[]?.uses?) | select(. != null)]'
          immutable_query='type == "array" and
            all(.[]; type == "string") and
            all(.[];
              if startswith("./") then true
              elif startswith("docker://") then test("^docker://[^@[:space:]]+@sha256:[0-9a-f]{64}$")
              else test("@[0-9a-f]{40}$")
              end)'

          # Prove the semantic extractor handles YAML-equivalent quoted keys and
          # whitespace before the colon; a line-oriented grep does not.
          semantic_fixture=$'jobs:\n  reusable:\n    "uses": owner/repository/.github/workflows/check.yml@aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa\n  steps:\n    runs-on: ubuntu-latest\n    steps:\n      - "uses": docker://registry.example/image:latest\n      - uses : ./local-action\n'
          fixture_references="$(printf '%s' "${semantic_fixture}" \
            | go run github.com/mikefarah/yq/v4@v4.53.3 eval -o=json -I=0 "${uses_query}" -)"
          printf '%s\n' "${fixture_references}" \
            | jq -e 'length == 3 and index("docker://registry.example/image:latest") != null and index("./local-action") != null' >/dev/null
          if printf '%s\n' "${fixture_references}" | jq -e "${immutable_query}" >/dev/null; then
            echo "mutable container reference regression" >&2
            exit 1
          fi
          printf '%s\n' '["docker://registry.example/image@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"]' \
            | jq -e "${immutable_query}" >/dev/null

          violations=0
          for workflow in "${workflow_files[@]}"; do
            references_json="$(go run github.com/mikefarah/yq/v4@v4.53.3 eval -o=json -I=0 \
              "${uses_query}" "${workflow}")"
            if ! printf '%s\n' "${references_json}" | jq -e "${immutable_query}" >/dev/null; then
              echo "workflow contains a non-immutable uses reference: ${workflow}" >&2
              violations=1
            fi
          done
          exit "${violations}"
