name: release-provenance

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-provenance
  cancel-in-progress: false

jobs:
  artifact-provenance:
    if: >-
      github.event_name == 'push' &&
      github.ref_protected &&
      ((github.ref_type == 'branch' && github.ref_name == 'main') ||
      (github.ref_type == 'tag' && startsWith(github.ref_name, 'v')))
    permissions:
      contents: read
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.25.7
          check-latest: false
          cache: true
      - name: Build release bundle and CycloneDX SBOM
        shell: bash
        run: |
          set -euo pipefail
          export GOOS=linux GOARCH=amd64 CGO_ENABLED=0
          export SOURCE_DATE_EPOCH
          SOURCE_DATE_EPOCH="$(git show -s --format=%ct HEAD)"
          root="dist/cloudring-linux-amd64"
          mkdir -p "${root}/bin"
          while IFS= read -r command_dir; do
            command_name="$(basename "${command_dir}")"
            go build -mod=readonly -trimpath -buildvcs=true \
              -ldflags='-s -w -buildid=' \
              -o "${root}/bin/${command_name}" "./${command_dir}"
          done < <(find cmd -mindepth 1 -maxdepth 1 -type d -print | sort)
          cp LICENSE NOTICE "${root}/"
          go run github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@v1.10.0 \
            mod -json -test -licenses -output dist/cloudring-sbom.cdx.json .
          jq -e \
            '.bomFormat == "CycloneDX" and .specVersion == "1.6" and (.components | length) >= 1' \
            dist/cloudring-sbom.cdx.json >/dev/null
          cp dist/cloudring-sbom.cdx.json "${root}/"
          tar --sort=name --mtime="@${SOURCE_DATE_EPOCH}" --owner=0 --group=0 \
            --numeric-owner -C dist -czf dist/cloudring-linux-amd64.tar.gz \
            cloudring-linux-amd64
          sha256sum dist/cloudring-linux-amd64.tar.gz \
            > dist/cloudring-linux-amd64.tar.gz.sha256
      - name: Upload release bundle and SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cloudring-linux-amd64
          path: |
            dist/cloudring-linux-amd64.tar.gz
            dist/cloudring-linux-amd64.tar.gz.sha256
            dist/cloudring-sbom.cdx.json
          if-no-files-found: error
          retention-days: 30
      - name: Attest release bundle provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/cloudring-linux-amd64.tar.gz
      - name: Attest release bundle SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/cloudring-linux-amd64.tar.gz
          sbom-path: dist/cloudring-sbom.cdx.json

  recovery-worker-image:
    if: >-
      github.event_name == 'push' &&
      github.ref_protected &&
      ((github.ref_type == 'branch' && github.ref_name == 'main') ||
      (github.ref_type == 'tag' && startsWith(github.ref_name, 'v')))
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.25.7
          check-latest: false
          cache: true
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          version: v0.34.1
          driver-opts: image=moby/buildkit@sha256:2f5adac4ecd194d9f8c10b7b5d7bceb5186853db1b26e5abd3a657af0b7e26ec
      - name: Build reproducible pinned worker inputs
        id: inputs
        shell: bash
        run: |
          set -euo pipefail
          source_date_epoch="$(git show -s --format=%ct HEAD)"
          install -d -m 0755 dist/etcd-recovery-worker
          for attempt in 1 2; do
            GOCACHE="${RUNNER_TEMP}/go-cache-${attempt}" \
            SOURCE_DATE_EPOCH="${source_date_epoch}" \
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
              go build -mod=readonly -trimpath -buildvcs=true \
                -ldflags='-s -w -buildid=' \
                -o "${RUNNER_TEMP}/cloudring-etcd-recovery-worker-${attempt}" \
                ./cmd/cloudring-etcd-recovery-worker
          done
          cmp \
            "${RUNNER_TEMP}/cloudring-etcd-recovery-worker-1" \
            "${RUNNER_TEMP}/cloudring-etcd-recovery-worker-2"
          install -m 0555 \
            "${RUNNER_TEMP}/cloudring-etcd-recovery-worker-1" \
            dist/etcd-recovery-worker/cloudring-etcd-recovery-worker
          version='3.6.13'
          archive="${RUNNER_TEMP}/etcd-v${version}-linux-amd64.tar.gz"
          release="${RUNNER_TEMP}/etcd-v${version}-linux-amd64"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "${archive}" \
            "https://github.com/etcd-io/etcd/releases/download/v${version}/etcd-v${version}-linux-amd64.tar.gz"
          echo 'b4928654aed84d90952620c7144555e4186d795e1e7414e65fe0cf6265fd0465  '"${archive}" | sha256sum --check --strict
          tar --extract --gzip --file "${archive}" --directory "${RUNNER_TEMP}"
          install -m 0555 "${release}/etcdutl" dist/etcd-recovery-worker/etcdutl
          test "$(dist/etcd-recovery-worker/etcdutl version)" = $'etcdutl version: 3.6.13\nAPI version: 3.6'
          tool_digest="$(sha256sum dist/etcd-recovery-worker/etcdutl | cut -d ' ' -f 1)"
          worker_digest="$(sha256sum dist/etcd-recovery-worker/cloudring-etcd-recovery-worker | cut -d ' ' -f 1)"
          test "${tool_digest}" = 'd3b1ab51f3277a60ee37dfd749941e663c14184d5bc0c26d0cf06f5414d18199'
          jq -n -cS \
            --arg source_commit "${GITHUB_SHA}" \
            --arg tool_digest "${tool_digest}" \
            --arg worker_digest "${worker_digest}" '
            {
              bomFormat: "CycloneDX",
              specVersion: "1.6",
              version: 1,
              metadata: {
                component: {
                  type: "application",
                  name: "cloudring-etcd-recovery-worker-release-components",
                  version: ("sha-" + $source_commit)
                },
                properties: [
                  {name: "cloudring.sbom.scope", value: "release-components"},
                  {name: "cloudring.sbom.image-package-inventory", value: "false"}
                ]
              },
              components: [
              {
                type: "application",
                name: "cloudring-etcd-recovery-worker",
                version: ("sha-" + $source_commit),
                hashes: [{alg: "SHA-256", content: $worker_digest}]
              },
              {
                type: "application",
                name: "etcdutl",
                version: "3.6.13",
                purl: "pkg:github/etcd-io/etcd@v3.6.13",
                hashes: [{alg: "SHA-256", content: $tool_digest}]
              },
              {
                type: "container",
                name: "gcr.io/distroless/static-debian12:nonroot",
                version: "sha256:f5b485ea962d9bd1186b2f6b3a061191539b905b82ec395de78cbfae51f20e35",
                hashes: [{alg: "SHA-256", content: "f5b485ea962d9bd1186b2f6b3a061191539b905b82ec395de78cbfae51f20e35"}]
              }
            ]
            }
          ' > dist/etcd-recovery-worker-components.cdx.json
          jq -e '
            .bomFormat == "CycloneDX" and .specVersion == "1.6" and
            (.metadata.properties[] | select(.name == "cloudring.sbom.image-package-inventory").value) == "false" and
            ([.components[].name] | index("cloudring-etcd-recovery-worker") != null) and
            ([.components[].name] | index("etcdutl") != null)
          ' dist/etcd-recovery-worker-components.cdx.json >/dev/null
          component_sbom_digest="$(sha256sum dist/etcd-recovery-worker-components.cdx.json | cut -d ' ' -f 1)"
          containerfile_digest="$(sha256sum build/etcd-recovery-worker/Containerfile | cut -d ' ' -f 1)"
          syft_version='1.49.0'
          syft_archive="${RUNNER_TEMP}/syft_${syft_version}_linux_amd64.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "${syft_archive}" \
            "https://github.com/anchore/syft/releases/download/v${syft_version}/syft_${syft_version}_linux_amd64.tar.gz"
          echo '7aa2f03ee92739cf643279ba3990548b9925d4e22cae13f46831ee62821147fe  '"${syft_archive}" | sha256sum --check --strict
          tar --extract --gzip --file "${syft_archive}" --directory "${RUNNER_TEMP}" syft
          test "$("${RUNNER_TEMP}/syft" version -o json | jq -r .version)" = "${syft_version}"
          {
            printf 'source-date-epoch=%s\n' "${source_date_epoch}"
            printf 'worker-sha256=%s\n' "${worker_digest}"
            printf 'etcdutl-sha256=%s\n' "${tool_digest}"
            printf 'component-sbom-sha256=%s\n' "${component_sbom_digest}"
            printf 'containerfile-sha256=%s\n' "${containerfile_digest}"
          } >> "${GITHUB_OUTPUT}"
      - name: Verify two independent image builds
        id: reproducibility
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2; do
            docker buildx build \
              --file build/etcd-recovery-worker/Containerfile \
              --platform linux/amd64 \
              --no-cache \
              --provenance=false \
              --sbom=false \
              --output "type=oci,dest=${RUNNER_TEMP}/recovery-worker-${attempt}.tar,rewrite-timestamp=true" \
              --build-arg "SOURCE_DATE_EPOCH=${{ steps.inputs.outputs.source-date-epoch }}" \
              --build-arg "SOURCE_REVISION=${GITHUB_SHA}" \
              --metadata-file "${RUNNER_TEMP}/recovery-worker-${attempt}.metadata.json" \
              .
            tar --extract --to-stdout \
              --file "${RUNNER_TEMP}/recovery-worker-${attempt}.tar" \
              index.json \
              | jq -er '
                  [.manifests[] |
                    select(.platform.os == "linux" and .platform.architecture == "amd64") |
                    .digest] |
                  select(length == 1) | .[0] |
                  select(test("^sha256:[0-9a-f]{64}$"))
                ' > "${RUNNER_TEMP}/recovery-worker-${attempt}.subject"
          done
          cmp \
            "${RUNNER_TEMP}/recovery-worker-1.subject" \
            "${RUNNER_TEMP}/recovery-worker-2.subject"
          subject_digest="$(<"${RUNNER_TEMP}/recovery-worker-1.subject")"
          printf 'subject-digest=%s\n' "${subject_digest}" >> "${GITHUB_OUTPUT}"
      - name: Scan the verified OCI image layout
        id: image_sbom
        shell: bash
        run: |
          set -euo pipefail
          "${RUNNER_TEMP}/syft" scan \
            "oci-archive:${RUNNER_TEMP}/recovery-worker-1.tar" \
            -o cyclonedx-json=dist/etcd-recovery-worker-image.cdx.json
          jq -e '
            .bomFormat == "CycloneDX" and
            (.specVersion == "1.5" or .specVersion == "1.6") and
            (.components | type == "array")
          ' dist/etcd-recovery-worker-image.cdx.json >/dev/null
          image_sbom_digest="$(sha256sum dist/etcd-recovery-worker-image.cdx.json | cut -d ' ' -f 1)"
          printf 'sha256=%s\n' "${image_sbom_digest}" >> "${GITHUB_OUTPUT}"
      - name: Authenticate to GHCR for the release-only push
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "${{ github.token }}" | \
            docker login ghcr.io --username "${{ github.actor }}" --password-stdin
      - name: Prepare immutable image tag
        id: image
        shell: bash
        run: |
          set -euo pipefail
          image='ghcr.io/opencloudtech/cloudring-etcd-recovery-worker'
          tag="${image}:sha-${GITHUB_SHA}"
          printf 'name=%s\n' "${image}" >> "${GITHUB_OUTPUT}"
          printf 'tag=%s\n' "${tag}" >> "${GITHUB_OUTPUT}"
      - name: Publish and verify the reviewed image subject
        id: push
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build \
            --file build/etcd-recovery-worker/Containerfile \
            --platform linux/amd64 \
            --no-cache \
            --provenance=false \
            --sbom=false \
            --output "type=registry,name=${{ steps.image.outputs.tag }},push=true,rewrite-timestamp=true,oci-mediatypes=true" \
            --build-arg "SOURCE_DATE_EPOCH=${{ steps.inputs.outputs.source-date-epoch }}" \
            --build-arg "SOURCE_REVISION=${GITHUB_SHA}" \
            --metadata-file "${RUNNER_TEMP}/recovery-worker-pushed.metadata.json" \
            .
          published_digest="$(
            jq -er '
              .["containerimage.digest"] |
              select(test("^sha256:[0-9a-f]{64}$"))
            ' "${RUNNER_TEMP}/recovery-worker-pushed.metadata.json"
          )"
          published_raw="$(
            docker buildx imagetools inspect \
              --raw \
              "${{ steps.image.outputs.name }}@${published_digest}"
          )"
          media_type="$(jq -r .mediaType <<<"${published_raw}")"
          if [[ "${media_type}" == "application/vnd.oci.image.index.v1+json" ]] ||
            [[ "${media_type}" == "application/vnd.docker.distribution.manifest.list.v2+json" ]]; then
            published_subject="$(
              jq -er '
                [.manifests[] |
                  select(.platform.os == "linux" and .platform.architecture == "amd64") |
                  .digest] |
                select(length == 1) | .[0] |
                select(test("^sha256:[0-9a-f]{64}$"))
              ' <<<"${published_raw}"
            )"
          else
            published_subject="${published_digest}"
          fi
          test "${published_subject}" = "${{ steps.reproducibility.outputs.subject-digest }}"
          printf 'digest=%s\n' "${published_digest}" >> "${GITHUB_OUTPUT}"
          printf 'subject-digest=%s\n' "${published_subject}" >> "${GITHUB_OUTPUT}"
      - name: Create canonical recovery worker release identity
        id: identity
        shell: bash
        run: |
          set -euo pipefail
          repository_host='git'
          repository_host+='hub.com'
          source_repository="https://${repository_host}/opencloudtech/CloudRING"
          jq -n -cS -j \
            --arg source_repository "${source_repository}" \
            --arg source_commit "${GITHUB_SHA}" \
            --argjson source_date_epoch "${{ steps.inputs.outputs.source-date-epoch }}" \
            --arg image_digest "${{ steps.push.outputs.digest }}" \
            --arg image_subject_digest "${{ steps.push.outputs.subject-digest }}" \
            --arg worker_digest "${{ steps.inputs.outputs.worker-sha256 }}" \
            --arg etcdutl_digest "${{ steps.inputs.outputs.etcdutl-sha256 }}" \
            --arg component_sbom_digest "${{ steps.inputs.outputs.component-sbom-sha256 }}" \
            --arg image_sbom_digest "${{ steps.image_sbom.outputs.sha256 }}" \
            --arg containerfile_digest "${{ steps.inputs.outputs.containerfile-sha256 }}" '
            {
              baseImageDigest: "sha256:f5b485ea962d9bd1186b2f6b3a061191539b905b82ec395de78cbfae51f20e35",
              baseImageName: "gcr.io/distroless/static-debian12:nonroot",
              buildPlatform: "linux/amd64",
              componentSbomSha256: $component_sbom_digest,
              containerfileSha256: $containerfile_digest,
              etcdutlSha256: $etcdutl_digest,
              etcdutlVersion: "3.6.13",
              imageDigest: $image_digest,
              imageName: "ghcr.io/opencloudtech/cloudring-etcd-recovery-worker",
              imageSbomSha256: $image_sbom_digest,
              imageSubjectDigest: $image_subject_digest,
              schemaVersion: "cloudring.etcd-recovery.image-identity/v1",
              sourceCommitSha: $source_commit,
              sourceDateEpoch: $source_date_epoch,
              sourceRepository: $source_repository,
              workerExecutableSha256: $worker_digest
            }
          ' > dist/etcd-recovery-worker-identity.json
          jq -e --arg source_repository "${source_repository}" '
            type == "object" and
            (keys == [
              "baseImageDigest", "baseImageName", "buildPlatform",
              "componentSbomSha256", "containerfileSha256", "etcdutlSha256",
              "etcdutlVersion", "imageDigest", "imageName", "imageSbomSha256",
              "imageSubjectDigest", "schemaVersion", "sourceCommitSha",
              "sourceDateEpoch", "sourceRepository", "workerExecutableSha256"
            ]) and
            .schemaVersion == "cloudring.etcd-recovery.image-identity/v1" and
            .sourceRepository == $source_repository and
            (.sourceCommitSha | test("^[0-9a-f]{40}$")) and
            (.sourceDateEpoch | type == "number" and . >= 1 and floor == .) and
            .buildPlatform == "linux/amd64" and
            .imageName == "ghcr.io/opencloudtech/cloudring-etcd-recovery-worker" and
            (.imageDigest | test("^sha256:[0-9a-f]{64}$")) and
            (.imageSubjectDigest | test("^sha256:[0-9a-f]{64}$")) and
            (.workerExecutableSha256 | test("^[0-9a-f]{64}$")) and
            .etcdutlVersion == "3.6.13" and
            .etcdutlSha256 == "d3b1ab51f3277a60ee37dfd749941e663c14184d5bc0c26d0cf06f5414d18199" and
            .baseImageName == "gcr.io/distroless/static-debian12:nonroot" and
            .baseImageDigest == "sha256:f5b485ea962d9bd1186b2f6b3a061191539b905b82ec395de78cbfae51f20e35" and
            (.containerfileSha256 | test("^[0-9a-f]{64}$")) and
            (.componentSbomSha256 | test("^[0-9a-f]{64}$")) and
            (.imageSbomSha256 | test("^[0-9a-f]{64}$"))
          ' dist/etcd-recovery-worker-identity.json >/dev/null
          identity_digest="$(sha256sum dist/etcd-recovery-worker-identity.json | cut -d ' ' -f 1)"
          printf 'sha256=%s\n' "${identity_digest}" >> "${GITHUB_OUTPUT}"
      - name: Upload recovery worker identity and SBOMs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cloudring-etcd-recovery-worker-release-evidence
          path: |
            dist/etcd-recovery-worker-identity.json
            dist/etcd-recovery-worker-components.cdx.json
            dist/etcd-recovery-worker-image.cdx.json
          if-no-files-found: error
          retention-days: 30
      - name: Attest recovery worker image provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      - name: Attest recovery worker image SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: dist/etcd-recovery-worker-image.cdx.json
          push-to-registry: true
      - name: Attest recovery worker release-component SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/etcd-recovery-worker-components.cdx.json
      - name: Attest canonical recovery worker release identity
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/etcd-recovery-worker-identity.json
      - name: Verify anonymous immutable image pull
        shell: bash
        run: |
          set -euo pipefail
          docker logout ghcr.io
          docker image rm "${{ steps.image.outputs.name }}@${{ steps.push.outputs.digest }}" 2>/dev/null || true
          docker pull "${{ steps.image.outputs.name }}@${{ steps.push.outputs.digest }}"
