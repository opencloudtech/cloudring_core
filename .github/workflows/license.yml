name: license

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:

permissions:
  contents: read

jobs:
  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - shell: bash
        run: |
          set -euo pipefail
          grep -q "Apache License" LICENSE
          grep -q "Apache-2.0" NOTICE
          if grep -Eqi "MIT License|Mozilla Public License|GNU GENERAL PUBLIC LICENSE" LICENSE; then
            exit 1
          fi
