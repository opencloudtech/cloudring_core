name: license

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  license-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.25.x
          check-latest: true
          cache: true
      - shell: bash
        run: |
          set -euo pipefail
          grep -q "Apache License" LICENSE
          grep -q "Apache-2.0" NOTICE
          if grep -Eqi "MIT License|Mozilla Public License|GNU GENERAL PUBLIC LICENSE" LICENSE; then
            exit 1
          fi
          go run github.com/google/go-licenses/v2@v2.0.1 check ./... \
            --include_tests \
            --allowed_licenses=Apache-2.0,BSD-2-Clause,BSD-3-Clause,MIT,ISC
