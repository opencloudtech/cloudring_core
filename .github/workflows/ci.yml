name: ci

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read

env:
  OCS_SHIPPED_PACKAGE_GLOBS: >-
    examples/synthetic-service-module/connector-package.json
    reference/synthetic-service/module-package.json
    modules/*/module-package.json

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  go-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.25.x
          check-latest: true
          cache: true
      - name: Verify delivery roadmap
        run: go run ./cmd/cloudring-roadmap verify --root ./roadmap
      - name: Test minimum supported Go
        run: go test ./... -count=1
      - name: Test real offline etcd snapshot recovery
        shell: bash
        run: |
          set -euo pipefail
          version='3.6.13'
          archive="${RUNNER_TEMP}/etcd-v${version}-linux-amd64.tar.gz"
          release="${RUNNER_TEMP}/etcd-v${version}-linux-amd64"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "${archive}" \
            "https://github.com/etcd-io/etcd/releases/download/v${version}/etcd-v${version}-linux-amd64.tar.gz"
          echo 'b4928654aed84d90952620c7144555e4186d795e1e7414e65fe0cf6265fd0465  '"${archive}" | sha256sum --check --strict
          tar --extract --gzip --file "${archive}" --directory "${RUNNER_TEMP}"
          data_dir="${RUNNER_TEMP}/synthetic-etcd"
          snapshot="${RUNNER_TEMP}/synthetic-snapshot.db"
          loopback_host='127.0.'
          loopback_host+='0.1'
          client_url="http://${loopback_host}:2379"
          peer_url="http://${loopback_host}:2380"
          "${release}/etcd" \
            --data-dir "${data_dir}" \
            --name synthetic \
            --listen-client-urls "${client_url}" \
            --advertise-client-urls "${client_url}" \
            --listen-peer-urls "${peer_url}" \
            --initial-advertise-peer-urls "${peer_url}" \
            --initial-cluster "synthetic=${peer_url}" \
            >"${RUNNER_TEMP}/synthetic-etcd.log" 2>&1 &
          etcd_pid=$!
          trap 'kill "${etcd_pid}" 2>/dev/null || true; wait "${etcd_pid}" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 60); do
            if "${release}/etcdctl" --endpoints="${client_url}" endpoint health >/dev/null 2>&1; then
              break
            fi
            if [[ "${attempt}" == 60 ]]; then
              exit 1
            fi
            sleep 1
          done
          "${release}/etcdctl" --endpoints="${client_url}" put synthetic-key synthetic-value >/dev/null
          "${release}/etcdctl" --endpoints="${client_url}" snapshot save "${snapshot}" >/dev/null
          kill "${etcd_pid}"
          wait "${etcd_pid}" || true
          trap - EXIT
          chmod 0600 "${snapshot}"
          CLOUDRING_TEST_ETCD_SNAPSHOT="${snapshot}" \
          CLOUDRING_TEST_ETCDUTL="${release}/etcdutl" \
            go test -tags=etcdrecoveryintegration ./pkg/backup/etcdrecovery -run '^TestRealSyntheticSnapshotRecovery$' -count=1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.x
          check-latest: true
          cache: true
      - name: Test current Go
        run: go test ./... -count=1

  go-test-race:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.25.x
          check-latest: true
          cache: true
      - run: go test -race ./... -count=1

  postgres-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: golang:1.25.7-bookworm@sha256:564e366a28ad1d70f460a2b97d1d299a562f08707eb0ecb24b659e5bd6c108e1
    services:
      postgres:
        image: postgres:18.4@sha256:c2d42a104eb6b37b286a2d9c5cf83f349de4d6516d513d00a2bd9610e2c2e5e4
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.25.x
          check-latest: true
          cache: true
      - name: Test transactional state against PostgreSQL
        env:
          CLOUDRING_POSTGRES_TEST_DSN: host=postgres port=5432 user=postgres dbname=postgres sslmode=disable
        run: go test ./pkg/transactionalstate -run '^TestPostgreSQLDocumentLifecycleAndConcurrency$' -count=1

  go-vet:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.25.x
          check-latest: true
          cache: true
      - run: go vet ./...

  platform-manifests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.25.x
          check-latest: true
          cache: true
      - name: Verify generic platform manifests
        run: |
          go test ./internal/platformmanifest -count=1
          kubectl kustomize deploy/kubernetes/storage/csi-snapshot-api/crds >/dev/null
          kubectl kustomize deploy/kubernetes/storage/csi-snapshot-api/controller >/dev/null
          go run ./cmd/cloudring-manifestcheck --root .

  windows-go-test:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.25.x
          check-latest: true
          cache: true
      - name: Test minimum supported Go
        run: go test ./... -count=1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.x
          check-latest: true
          cache: true
      - name: Test current Go
        run: go test ./... -count=1

  go-build-module-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.25.x
          check-latest: true
          cache: true
      - name: Verify module graph and build
        shell: bash
        run: |
          set -euo pipefail
          go mod verify
          go mod tidy -diff
          go list -mod=readonly -m all
          go build -mod=readonly -trimpath ./...

  ocs-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.25.x
          check-latest: true
          cache: true
      - name: Validate every shipped connector package
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          # shellcheck disable=SC2206 # The reviewed value intentionally contains a tracked glob.
          packages=(${OCS_SHIPPED_PACKAGE_GLOBS})
          (( ${#packages[@]} >= 3 ))
          go run ./cmd/ocsctl validate "${packages[@]}"

  ocs-conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.25.x
          check-latest: true
          cache: true
      - name: Check conformance for the same shipped connector packages
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          # shellcheck disable=SC2206 # The reviewed value intentionally contains a tracked glob.
          packages=(${OCS_SHIPPED_PACKAGE_GLOBS})
          (( ${#packages[@]} >= 3 ))
          go run ./cmd/ocsctl conformance "${packages[@]}"
      - name: Build and smoke-test the synthetic reference image
        shell: bash
        run: |
          set -euo pipefail
          image='cloudring-synthetic-service:ci'
          docker build --file ./reference/synthetic-service/Containerfile --tag "${image}" .
          docker run --rm "${image}" --mode=mock-provider --check

  docscheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - shell: bash
        run: |
          set -euo pipefail
          for file in README.md LICENSE NOTICE CONTRIBUTING.md SECURITY.md GOVERNANCE.md CLA.md DCO.md TRADEMARKS.md; do
            test -s "$file"
          done
          test -s docs/public-boundary.md
          test -s deploy/kubernetes/secret-manager/README.md

  source-safety:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.25.x
          check-latest: true
          cache: true
      - name: Scan complete checkout
        run: go run ./cmd/cloudring-sourcecheck scan --scope full
      - name: Scan every commit in the proposed range
        shell: bash
        run: |
          set -euo pipefail
          case "${GITHUB_EVENT_NAME}" in
            pull_request)
              base_sha="$(jq -r '.pull_request.base.sha // empty' "${GITHUB_EVENT_PATH}")"
              head_sha="$(jq -r '.pull_request.head.sha // empty' "${GITHUB_EVENT_PATH}")"
              ;;
            merge_group)
              base_sha="$(jq -r '.merge_group.base_sha // empty' "${GITHUB_EVENT_PATH}")"
              head_sha="$(jq -r '.merge_group.head_sha // empty' "${GITHUB_EVENT_PATH}")"
              ;;
            push)
              base_sha="$(jq -r '.before // empty' "${GITHUB_EVENT_PATH}")"
              head_sha="$(jq -r '.after // empty' "${GITHUB_EVENT_PATH}")"
              ;;
            *)
              echo "unsupported GitHub event for source-safety history scan: ${GITHUB_EVENT_NAME}" >&2
              exit 1
              ;;
          esac
          head_sha="${head_sha:-${GITHUB_SHA}}"
          base_sha="${base_sha:-0000000000000000000000000000000000000000}"
          go run ./cmd/cloudring-sourcecheck scan --scope pre-push --base "${base_sha}" --head "${head_sha}"
