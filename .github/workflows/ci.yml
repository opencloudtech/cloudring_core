name: ci

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:

permissions:
  contents: read

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./... -count=1

  ocs-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go run ./cmd/ocsctl validate ./cloudring_core/examples/synthetic-service-module/connector-package.json ./cloudring_core/reference/synthetic-service/module-package.json

  ocs-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go run ./cmd/ocsctl conformance ./cloudring_core/reference/synthetic-service/module-package.json

  docscheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - shell: bash
        run: |
          set -euo pipefail
          for file in README.md LICENSE NOTICE CONTRIBUTING.md SECURITY.md GOVERNANCE.md CLA.md DCO.md TRADEMARKS.md; do
            test -s "$file"
          done
          test -s cloudring_core/docs/public-boundary.md

  source-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - shell: bash
        run: |
          set -euo pipefail
          private_module='cloudring[.]'local'/platform'
          private_trace='require''ments/'
          private_evidence='[.]'omo'/'
          if find . -path ./.git -prune -o -type f -print0 | xargs -0 grep -nE "${private_module}|${private_trace}|${private_evidence}"; then
            exit 1
          fi
