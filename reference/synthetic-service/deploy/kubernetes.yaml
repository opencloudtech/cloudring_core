apiVersion: v1
kind: Namespace
metadata:
  name: synthetic-service-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: synthetic-service-controller
  namespace: synthetic-service-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: synthetic-service-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: synthetic-service-controller
    spec:
      serviceAccountName: synthetic-service-controller
      containers:
        - name: controller
          image: ghcr.io/opencloudtech/cloudring-synthetic-service:dev
          args:
            - --mode=mock-provider
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: synthetic-service-controller
  namespace: synthetic-service-system
