apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: platform-secrets
  labels:
    app.kubernetes.io/part-of: cloudring-secret-manager
  annotations:
    cloudring.org/non-claim: requires-live-openbao-auth-role-and-sync-proof
spec:
  conditions:
    - namespaces:
        - external-secrets
        - velero
  provider:
    vault:
      server: https://openbao.openbao.svc:8200
      path: cloudring
      version: v2
      caProvider:
        type: ConfigMap
        name: openbao-client-ca
        namespace: external-secrets
        key: ca.crt
      auth:
        kubernetes:
          mountPath: kubernetes
          role: cloudring-external-secrets
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
            audiences:
              - openbao
