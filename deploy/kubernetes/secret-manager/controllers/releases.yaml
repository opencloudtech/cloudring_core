apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trust-manager
  namespace: cert-manager
spec:
  interval: 15m
  releaseName: trust-manager
  chart:
    spec:
      chart: trust-manager
      version: v0.24.0
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: cert-manager
      interval: 1h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    crds:
      enabled: true
      keep: true
    replicaCount: 2
    image:
      repository: quay.io/jetstack/trust-manager
      digest: sha256:a7c1d71cad37b404738192213e3801dbf89fe797e72664b0ff0d498db35cea74
      pullPolicy: IfNotPresent
    defaultPackage:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 15m
  releaseName: external-secrets
  chart:
    spec:
      chart: external-secrets
      version: 2.7.0
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: external-secrets
      interval: 1h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    installCRDs: true
    replicaCount: 3
    leaderElect: true
    image:
      repository: ghcr.io/external-secrets/external-secrets
      tag: v2.7.0@sha256:6615aaea8ff44924d9d7dbc99982a130c82913f7583e212fa3aeebc6dc21fbf9
      pullPolicy: IfNotPresent
    webhook:
      replicaCount: 3
      failurePolicy: Fail
      image:
        repository: ghcr.io/external-secrets/external-secrets
        tag: v2.7.0@sha256:6615aaea8ff44924d9d7dbc99982a130c82913f7583e212fa3aeebc6dc21fbf9
        pullPolicy: IfNotPresent
      podDisruptionBudget:
        enabled: true
        minAvailable: 2
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 256Mi
    certController:
      replicaCount: 2
      image:
        repository: ghcr.io/external-secrets/external-secrets
        tag: v2.7.0@sha256:6615aaea8ff44924d9d7dbc99982a130c82913f7583e212fa3aeebc6dc21fbf9
        pullPolicy: IfNotPresent
      podDisruptionBudget:
        enabled: true
        minAvailable: 1
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 256Mi
    podDisruptionBudget:
      enabled: true
      minAvailable: 2
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: "1"
        memory: 512Mi
    concurrent: 10
    vault:
      enableTokenCache: false
    genericTargets:
      enabled: false
    bitwarden-sdk-server:
      enabled: false
