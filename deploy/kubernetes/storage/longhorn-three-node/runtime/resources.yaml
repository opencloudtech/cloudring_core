apiVersion: v1
kind: Namespace
metadata:
  name: longhorn-system
  labels:
    app.kubernetes.io/part-of: cloudring-storage
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/warn: baseline
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 1h
  url: https://charts.longhorn.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: snapshot-controller
  namespace: kube-system
  labels:
    app.kubernetes.io/name: snapshot-controller
    app.kubernetes.io/component: csi-snapshot-control-plane
    app.kubernetes.io/part-of: cloudring-storage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cloudring-snapshot-controller
  labels:
    app.kubernetes.io/name: snapshot-controller
    app.kubernetes.io/component: csi-snapshot-control-plane
    app.kubernetes.io/part-of: cloudring-storage
rules:
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["list", "watch", "create", "update", "patch"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshotclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshotcontents"]
    verbs: ["create", "get", "list", "watch", "update", "delete", "patch"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshotcontents/status"]
    verbs: ["patch"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots/status"]
    verbs: ["update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cloudring-snapshot-controller
  labels:
    app.kubernetes.io/name: snapshot-controller
    app.kubernetes.io/component: csi-snapshot-control-plane
    app.kubernetes.io/part-of: cloudring-storage
subjects:
  - kind: ServiceAccount
    name: snapshot-controller
    namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cloudring-snapshot-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cloudring-snapshot-controller-leader-election
  namespace: kube-system
  labels:
    app.kubernetes.io/name: snapshot-controller
    app.kubernetes.io/component: csi-snapshot-control-plane
    app.kubernetes.io/part-of: cloudring-storage
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "watch", "list", "delete", "update", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cloudring-snapshot-controller-leader-election
  namespace: kube-system
  labels:
    app.kubernetes.io/name: snapshot-controller
    app.kubernetes.io/component: csi-snapshot-control-plane
    app.kubernetes.io/part-of: cloudring-storage
subjects:
  - kind: ServiceAccount
    name: snapshot-controller
    namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cloudring-snapshot-controller-leader-election
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: snapshot-controller
  namespace: kube-system
  labels:
    app.kubernetes.io/name: snapshot-controller
    app.kubernetes.io/component: csi-snapshot-control-plane
    app.kubernetes.io/part-of: cloudring-storage
  annotations:
    cloudring.org/upstream-source: kubernetes-csi/external-snapshotter@v8.5.0
spec:
  replicas: 2
  minReadySeconds: 35
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: snapshot-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: snapshot-controller
        app.kubernetes.io/component: csi-snapshot-control-plane
        app.kubernetes.io/part-of: cloudring-storage
    spec:
      serviceAccountName: snapshot-controller
      priorityClassName: system-cluster-critical
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: snapshot-controller
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: snapshot-controller
          image: registry.k8s.io/sig-storage/snapshot-controller:v8.5.0@sha256:74ca61ab13e978f03cf0f336a607281d15f04cda0a38a881306365473b28a3d8
          imagePullPolicy: IfNotPresent
          args:
            - --v=2
            - --leader-election=true
            - --http-endpoint=:8080
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz/leader-election
              port: health
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
  labels:
    app.kubernetes.io/part-of: cloudring-storage
  annotations:
    cloudring.org/non-claim: downstream-host-prerequisites-and-live-storage-evidence-required
spec:
  suspend: true
  interval: 15m
  timeout: 15m
  releaseName: longhorn
  chart:
    spec:
      chart: longhorn
      version: 1.12.0
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: longhorn-system
      interval: 1h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    global:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
    persistence:
      createStorageClass: false
      defaultClass: false
    preUpgradeChecker:
      jobEnabled: false
      upgradeVersionCheck: false
    defaultSettings:
      createDefaultDiskLabeledNodes: false
      defaultDataPath: /var/lib/longhorn
      defaultReplicaCount: '{"v1":"3","v2":"3"}'
      replicaSoftAntiAffinity: false
      replicaZoneSoftAntiAffinity: true
      replicaDiskSoftAntiAffinity: false
      replicaAutoBalance: best-effort
      storageOverProvisioningPercentage: 100
      storageMinimalAvailablePercentage: 25
      storageReservedPercentageForDefaultDisk: 25
      taintToleration: node-role.kubernetes.io/control-plane:NoSchedule
      upgradeChecker: false
      disableRevisionCounter: '{"v1":"false"}'
      allowVolumeCreationWithDegradedAvailability: false
      allowCollectingLonghornUsageMetrics: false
      v1DataEngine: true
      v2DataEngine: false
    longhornUI:
      replicas: 2
    ingress:
      enabled: false
    metrics:
      serviceMonitor:
        enabled: false
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-replicated
  labels:
    app.kubernetes.io/part-of: cloudring-storage
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: driver.longhorn.io
parameters:
  numberOfReplicas: "3"
  staleReplicaTimeout: "30"
  fsType: ext4
  dataLocality: disabled
  unmapMarkSnapChainRemoved: ignored
  disableRevisionCounter: "false"
  dataEngine: v1
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshotClass
metadata:
  name: longhorn-retain
  labels:
    app.kubernetes.io/part-of: cloudring-storage
    velero.io/csi-volumesnapshot-class: "true"
  annotations:
    snapshot.storage.kubernetes.io/is-default-class: "false"
driver: driver.longhorn.io
deletionPolicy: Retain
