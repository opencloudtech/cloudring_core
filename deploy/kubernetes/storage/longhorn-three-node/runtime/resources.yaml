apiVersion: v1
kind: Namespace
metadata:
  name: longhorn-system
  labels:
    app.kubernetes.io/part-of: cloudring-storage
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/warn: baseline
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 1h
  url: https://charts.longhorn.io
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
  labels:
    app.kubernetes.io/part-of: cloudring-storage
  annotations:
    cloudring.org/non-claim: downstream-host-prerequisites-and-live-storage-evidence-required
spec:
  suspend: true
  interval: 15m
  timeout: 15m
  releaseName: longhorn
  chart:
    spec:
      chart: longhorn
      version: 1.12.0
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: longhorn-system
      interval: 1h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    global:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
    persistence:
      createStorageClass: false
      defaultClass: false
    preUpgradeChecker:
      jobEnabled: false
      upgradeVersionCheck: false
    defaultSettings:
      createDefaultDiskLabeledNodes: false
      defaultDataPath: /var/lib/longhorn
      defaultReplicaCount: '{"v1":"3","v2":"3"}'
      replicaSoftAntiAffinity: false
      replicaZoneSoftAntiAffinity: false
      replicaDiskSoftAntiAffinity: false
      replicaAutoBalance: best-effort
      storageOverProvisioningPercentage: 100
      storageMinimalAvailablePercentage: 25
      storageReservedPercentageForDefaultDisk: 25
      taintToleration: node-role.kubernetes.io/control-plane:NoSchedule
      upgradeChecker: false
      disableRevisionCounter: '{"v1":"false"}'
      allowVolumeCreationWithDegradedAvailability: false
      allowCollectingLonghornUsageMetrics: false
      v1DataEngine: true
      v2DataEngine: false
    longhornUI:
      replicas: 2
    ingress:
      enabled: false
    metrics:
      serviceMonitor:
        enabled: false
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-replicated
  labels:
    app.kubernetes.io/part-of: cloudring-storage
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: driver.longhorn.io
parameters:
  numberOfReplicas: "3"
  staleReplicaTimeout: "30"
  fsType: ext4
  dataLocality: disabled
  unmapMarkSnapChainRemoved: ignored
  disableRevisionCounter: "false"
  dataEngine: v1
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshotClass
metadata:
  name: longhorn-retain
  labels:
    app.kubernetes.io/part-of: cloudring-storage
    velero.io/csi-volumesnapshot-class: "true"
  annotations:
    snapshot.storage.kubernetes.io/is-default-class: "false"
driver: driver.longhorn.io
deletionPolicy: Retain
