apiVersion: v1
kind: Namespace
metadata:
  name: rook-ceph
  labels:
    app.kubernetes.io/part-of: cloudring-storage
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/warn: baseline
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: rook-release
  namespace: rook-ceph
spec:
  interval: 1h
  url: https://charts.rook.io/release
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph
  namespace: rook-ceph
  labels:
    app.kubernetes.io/part-of: cloudring-storage
spec:
  interval: 15m
  releaseName: rook-ceph
  chart:
    spec:
      chart: rook-ceph
      version: v1.20.2
      sourceRef:
        kind: HelmRepository
        name: rook-release
        namespace: rook-ceph
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    image:
      tag: v1.20.2
      pullPolicy: IfNotPresent
    crds:
      enabled: true
    currentNamespaceOnly: true
    allowLoopDevices: false
    enableDiscoveryDaemon: false
    csi:
      installCsiOperator: true
      serviceMonitor:
        enabled: false
    resources:
      requests:
        cpu: 200m
        memory: 128Mi
      limits:
        memory: 512Mi
