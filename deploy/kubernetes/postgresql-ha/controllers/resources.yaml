apiVersion: v1
kind: Namespace
metadata:
  name: cnpg-system
  labels:
    app.kubernetes.io/part-of: cloudring-postgresql
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cnpg
  namespace: cnpg-system
spec:
  interval: 1h
  url: oci://ghcr.io/cloudnative-pg/charts/cloudnative-pg
  ref:
    digest: sha256:209c588b902982bf283a0073db83edd422d9710a2c8a670fe57c0329abe789a4
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg
  namespace: cnpg-system
  annotations:
    cloudring.org/non-claim: downstream-live-controller-and-webhook-evidence-required
spec:
  suspend: true
  interval: 15m
  timeout: 10m
  releaseName: cnpg
  chartRef:
    kind: OCIRepository
    name: cnpg
    namespace: cnpg-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    replicaCount: 2
    image:
      repository: ghcr.io/cloudnative-pg/cloudnative-pg
      tag: 1.30.0@sha256:a2701eb97cdd2a34b1fdb2cb51987f544b706e40bec72ae7146cd8580efefebb
      pullPolicy: IfNotPresent
    crds:
      create: true
    webhook:
      mutating:
        create: true
        failurePolicy: Fail
      validating:
        create: true
        failurePolicy: Fail
    config:
      create: true
      clusterWide: true
      maxConcurrentReconciles: 10
    rbac:
      create: true
      aggregateClusterRoles: false
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsUser: 10001
      runAsGroup: 10001
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop:
          - ALL
    podSecurityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/instance: cnpg
            app.kubernetes.io/name: cloudnative-pg
    service:
      type: ClusterIP
      ipFamilyPolicy: PreferDualStack
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    monitoring:
      podMonitorEnabled: false
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cnpg-controller-manager
  namespace: cnpg-system
  labels:
    app.kubernetes.io/part-of: cloudring-postgresql
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: cnpg
      app.kubernetes.io/name: cloudnative-pg
