apiVersion: v1
kind: Namespace
metadata:
  name: cnpg-system
  labels:
    app.kubernetes.io/part-of: cloudring-postgresql
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cnpg
  namespace: cnpg-system
spec:
  interval: 1h
  url: oci://ghcr.io/cloudnative-pg/charts/cloudnative-pg
  ref:
    digest: sha256:209c588b902982bf283a0073db83edd422d9710a2c8a670fe57c0329abe789a4
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg
  namespace: cnpg-system
  annotations:
    cloudring.org/non-claim: downstream-live-controller-and-webhook-evidence-required
spec:
  suspend: true
  interval: 15m
  timeout: 10m
  releaseName: cnpg
  chartRef:
    kind: OCIRepository
    name: cnpg
    namespace: cnpg-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    replicaCount: 2
    image:
      repository: ghcr.io/cloudnative-pg/cloudnative-pg
      tag: 1.30.0@sha256:a2701eb97cdd2a34b1fdb2cb51987f544b706e40bec72ae7146cd8580efefebb
      pullPolicy: IfNotPresent
    crds:
      create: true
    webhook:
      mutating:
        create: true
        failurePolicy: Fail
      validating:
        create: true
        failurePolicy: Fail
    config:
      create: true
      clusterWide: true
      maxConcurrentReconciles: 10
    rbac:
      create: true
      aggregateClusterRoles: false
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsUser: 10001
      runAsGroup: 10001
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop:
          - ALL
    podSecurityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/instance: cnpg
            app.kubernetes.io/name: cloudnative-pg
    service:
      type: ClusterIP
      ipFamilyPolicy: PreferDualStack
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    monitoring:
      podMonitorEnabled: false
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cnpg-controller-manager
  namespace: cnpg-system
  labels:
    app.kubernetes.io/part-of: cloudring-postgresql
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: cnpg
      app.kubernetes.io/name: cloudnative-pg
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cnpg-barman-cloud
  namespace: cnpg-system
spec:
  interval: 1h
  url: oci://ghcr.io/cloudnative-pg/charts/plugin-barman-cloud
  ref:
    digest: sha256:5d31605cad886f93abb7cd9884170d74ece913fe8b95c74b127ec5e8bcd2b2b6
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg-barman-cloud
  namespace: cnpg-system
  annotations:
    cloudring.org/non-claim: downstream-plugin-tls-controller-and-live-archive-evidence-required
spec:
  suspend: true
  interval: 15m
  timeout: 10m
  releaseName: plugin-barman-cloud
  chartRef:
    kind: OCIRepository
    name: cnpg-barman-cloud
    namespace: cnpg-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    replicaCount: 2
    serviceAccount:
      create: false
      name: cloudring-cnpg-barman-cloud
    rbac:
      create: false
      cnpgGroup: postgresql.cnpg.io
    image:
      registry: ghcr.io
      repository: cloudnative-pg/plugin-barman-cloud
      tag: v0.13.0@sha256:71589dbac582333442812b07b31f7ea4d00324a8358aac7ca507dabf9f4b6c96
      pullPolicy: IfNotPresent
    sidecarImage:
      registry: ghcr.io
      repository: cloudnative-pg/plugin-barman-cloud-sidecar
      tag: v0.13.0@sha256:990361af3319f9e23aafa0f6d7981f99bf1f69b4e6a85cf1bc7d71d6f09bb288
    crds:
      create: true
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsUser: 10001
      runAsGroup: 10001
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop:
          - ALL
    podSecurityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/instance: plugin-barman-cloud
            app.kubernetes.io/name: plugin-barman-cloud
    service:
      ipFamilyPolicy: PreferDualStack
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: "1"
        memory: 512Mi
    certificate:
      createClientCertificate: true
      createServerCertificate: true
      createIssuer: true
      duration: 2160h
      renewBefore: 360h
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudring-cnpg-barman-cloud
  namespace: cnpg-system
  labels:
    app.kubernetes.io/part-of: cloudring-postgresql
  annotations:
    cloudring.org/rbac-source: plugin-barman-cloud-v0.13.0
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cloudring-cnpg-barman-cloud-upstream-v0130
  labels:
    app.kubernetes.io/part-of: cloudring-postgresql
  annotations:
    cloudring.org/non-claim: exact-upstream-v0.13.0-controller-api-requires-cluster-wide-watch
    cloudring.org/upstream-chart-source-sha: 83bd9c59514cb7ff3692049d85ba604dcb458700
    cloudring.org/upstream-plugin-source-sha: 1cd26c92867bd27a8cc14beab8e455cf3b64cb10
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - create
      - delete
      - get
      - list
      - watch
  - apiGroups:
      - barmancloud.cnpg.io
    resources:
      - objectstores
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - barmancloud.cnpg.io
    resources:
      - objectstores/finalizers
    verbs:
      - update
  - apiGroups:
      - barmancloud.cnpg.io
    resources:
      - objectstores/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - postgresql.cnpg.io
    resources:
      - backups
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - postgresql.cnpg.io
    resources:
      - clusters/finalizers
    verbs:
      - update
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - rolebindings
      - roles
    verbs:
      - create
      - get
      - list
      - patch
      - update
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cloudring-cnpg-barman-cloud-upstream-v0130
  labels:
    app.kubernetes.io/part-of: cloudring-postgresql
  annotations:
    cloudring.org/non-claim: upstream-controller-api-cluster-scope-is-a-reviewed-residual-limitation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cloudring-cnpg-barman-cloud-upstream-v0130
subjects:
  - kind: ServiceAccount
    name: cloudring-cnpg-barman-cloud
    namespace: cnpg-system
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cnpg-barman-cloud
  namespace: cnpg-system
  labels:
    app.kubernetes.io/part-of: cloudring-postgresql
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: plugin-barman-cloud
      app.kubernetes.io/name: plugin-barman-cloud
