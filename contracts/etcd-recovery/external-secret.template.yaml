# Downstream-only binding template. Replace both placeholders with a reviewed
# provider/site SecretStore and remote reference; no credential value belongs
# in Git.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudring-etcd-recovery-credentials
  namespace: kube-system
spec:
  refreshPolicy: CreatedOnce
  secretStoreRef:
    kind: ClusterSecretStore
    name: REPLACE_WITH_REVIEWED_STORE
  target:
    name: cloudring-etcd-recovery-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: access-key-id
      remoteRef:
        key: REPLACE_WITH_REVIEWED_ACCESS_KEY_REFERENCE
    - secretKey: secret-access-key
      remoteRef:
        key: REPLACE_WITH_REVIEWED_SECRET_KEY_REFERENCE
